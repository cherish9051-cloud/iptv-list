name: Update optimized IPTV playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "config/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write

concurrency:
  group: update-iptv-playlist
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build optimized playlist
        run: python scripts/build_playlist.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/cn_best.m3u8 output/selection-report.json

          if git diff --cached --quiet; then
            echo "Generated files have not changed."
            exit 0
          fi

          git commit -m "chore: update optimized IPTV playlist"
          git push
